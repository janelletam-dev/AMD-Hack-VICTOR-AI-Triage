# Nixpacks build config for V.I.C.T.O.R. — Python backend + React frontend,
# single Railway service. The frontend is built to `frontend/dist/`, then
# served at runtime by FastAPI's StaticFiles mount in `backend/main.py`.

[phases.setup]
nixPkgs = ["python311", "nodejs_20"]

[phases.install]
cmds = [
  "cd frontend && npm ci",
  "python -m pip install --upgrade pip",
  "pip install -r backend/requirements.txt",
]

[phases.build]
cmds = ["cd frontend && npm run build"]

[start]
cmd = "cd backend && python -m uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}"
